services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: webdevcody
      POSTGRES_USER: webdevcody
      POSTGRES_PASSWORD: webdevcody
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webdevcody -d webdevcody"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
